<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>You're offline — Blorbify</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #101820;
        color: #F5F1E8;
        font-family: system-ui, sans-serif;
        text-align: center;
        padding: 24px;
        box-sizing: border-box;
      }
      .card { max-width: 360px; }
      h1 { font-size: 22px; margin: 0 0 10px; }
      p { margin: 0 0 20px; color: #A9B2BA; font-size: 14px; line-height: 1.5; }
      button {
        background: #FF7A00;
        color: #101820;
        border: none;
        border-radius: 999px;
        padding: 12px 24px;
        font-weight: 700;
        font-size: 14px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>You're offline</h1>
      <p>We couldn't reach the network. Showing your last visit isn't available for this page yet — reconnect and try again.</p>
      <button onclick="location.reload()">Try again</button>
    </div>
  </body>
</html>
